- name: Deploy health check script
  template:
    src:   health-check.sh.j2
    dest:  "{{ health_script }}"
    owner: root
    group: root
    mode:  "0755"

- name: Create health log file if not present
  file:
    path:  "{{ health_log }}"
    state: touch
    owner: root
    group: root
    mode:  "0644"

- name: Cron daily health check at 03:00 
  cron:
    name:   "Nexcore daily health check"
    minute: "0"
    hour:   "3"
    job:    "{{ health_script }} >> {{ health_log }} 2>&1"
    state:  present
    user:   root

- name: Cron daily summary
  cron:
    name:   "Nexcore daily health email"
    minute: "5"
    hour:   "3"
    job: >-
      (
      echo "=== servera ===";
      tail -n 8 {{ health_log }};
      echo "";
      echo "=== serverb ===";
      tail -n 8 {{ serverb_health_log }};
      ) | mail -s '[NexCore] Daily Health Check Report' {{ ops_email }}
    state:  present
    user:   root
  when: inventory_hostname in groups['web']

- name: Cron weekly dnf cache cleanup Sunday 04:00
  cron:
    name:    "Nexcore weekly dnf clean"
    minute:  "0"
    hour:    "4"
    weekday: "0"
    job:     "/usr/bin/dnf clean all >> /var/log/nexcore-dnf-clean.log 2>&1"
    state:   present
    user:    root

- name: Deploy logrotate config for health log
  template:
    src:   logrotate.j2
    dest:  /etc/logrotate.d/nexcore-health
    owner: root
    group: root
    mode:  "0644"
