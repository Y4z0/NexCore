---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Start and enable Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

- name: Deploy WordPress configuration
  template:
    src: wp-nginx.j2
    dest: /etc/nginx/conf.d/{{ wp_domain }}.conf
    mode: '0644'
  notify: reload nginx

- name: Deploy Mediawiki configuration
  template:
    src: mediawiki-nginx.j2
    dest: /etc/nginx/conf.d/{{ mediawiki_domain }}.conf
    mode: '0644'
  notify: reload nginx

- name: Remove default Nginx welcome page config
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: reload nginx

- name: Enable httpd_can_network_connect
  seboolean:
    name: httpd_can_network_connect
    state: yes
    persistent: yes

- name: Enable httpd_can_network_connect_db
  seboolean:
    name: httpd_can_network_connect_db
    state: yes
    persistent: yes


