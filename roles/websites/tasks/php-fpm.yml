---
- name: Install EPEL repository
  dnf:
    name: epel-release
    state: present

- name: Install Remi repository
  dnf:
    name: "https://rpms.remirepo.net/enterprise/remi-release-{{ ansible_distribution_major_version }}.rpm"
    state: present
    disable_gpg_check: true

- name: Get currently enabled PHP module stream
  shell:
    cmd: "dnf module list php --enabled 2>/dev/null | awk '/remi/{print $2}' | head -1"
  register: current_php_stream
  changed_when: false
  failed_when: false

- name: Remove all installed PHP packages
  shell:
    cmd: "dnf remove -y 'php*'"
  when:
    - current_php_stream.stdout | trim | length > 0
    - current_php_stream.stdout | trim != ('remi-' + php_version)
  changed_when: true   

- name: Reset PHP module stream
  shell:
    cmd: dnf module reset php -y
  when:
    - current_php_stream.stdout | trim | length > 0
    - current_php_stream.stdout | trim != ('remi-' + php_version)
  changed_when: true

- name: Enable PHP module stream
  shell:
    cmd: "dnf module enable php:remi-{{ php_version }} -y"
  register: enable_php_stream
  when: current_php_stream.stdout | trim != ('remi-' + php_version) 
  failed_when: enable_php_stream.rc != 0
  changed_when: "'Nothing to do' not in enable_php_stream.stdout"

- name: Install required PHP extensions
  dnf:
    name:
      - php-cli
      - php-fpm
      - php-mysqlnd
      - php-curl
      - php-gd
      - php-mbstring
      - php-xml
      - php-zip
      - php-intl
      - php-imagick
      - php-bcmath
      - php-sodium
    state: present

- name: Configure PHP upload limits
  lineinfile:
    path:   /etc/php.ini
    regexp: "{{ item.regexp }}"
    line:   "{{ item.line }}"
  loop:
    - { regexp: '^upload_max_filesize', line: 'upload_max_filesize = 64M' }
    - { regexp: '^post_max_size',       line: 'post_max_size = 64M'       }
    - { regexp: '^memory_limit',        line: 'memory_limit = 256M'       }
    - { regexp: '^max_execution_time',  line: 'max_execution_time = 300'  }
    - { regexp: '^max_input_vars',      line: 'max_input_vars = 3000'     }
  notify: restart php-fpm

- name: Configure PHP-FPM pool to run as nginx user
  lineinfile:
    path:   /etc/php-fpm.d/www.conf
    regexp: "{{ item.regexp }}"
    line:   "{{ item.line }}"
  loop:
    - { regexp: '^user =',  line: 'user = nginx'  }
    - { regexp: '^group =', line: 'group = nginx' }
  notify: restart php-fpm