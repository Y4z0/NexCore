# OS check and package update/install
- name: Verify target is a RHEL-based system
  assert:
    that:
      - ansible_os_family == "RedHat"
    fail_msg: "This playbook is intended for RHEL-based systems only (got: {{ ansible_os_family }})"

- name: Update all packages to latest
  dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Make sure required packages are installed
  ansible.builtin.dnf:
    name:
      - python3-libsemanage
      - wget
      - tar
    state: present

# Firewalld rules

- name: Get enabled services
  command: firewall-cmd --zone=public --list-services
  register: firewalld_services
  changed_when: false

- name: Remove all services from zone
  ansible.posix.firewalld:
    zone: public
    service: "{{ item }}"
    state: disabled
    permanent: true
    immediate: true
  loop: "{{ firewalld_services.stdout.split() }}"

- name: Enable common services in firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - ssh
    - nfs
    - rpc-bind
    - mountd

- name: Enable web/dns services in firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - http
    - dns
  when: inventory_hostname in groups['web']

- name: Enable database services in firewalld
  ansible.posix.firewalld:
    service: mysql
    state: enabled
    permanent: true
    immediate: true
  when: inventory_hostname in groups['database']

- name: Open SMTP port 25 in firewalld
  ansible.posix.firewalld:
    port: "25/tcp"
    permanent: true
    state: enabled
    immediate: true
  when: inventory_hostname in groups['web']

# DNS setup via nmcli

- name: Get active NetworkManager connection name
  ansible.builtin.command:
    cmd: nmcli -g NAME connection show --active
  register: nm_connection
  changed_when: false

- name: Get current DNS servers for connection
  ansible.builtin.command:
    cmd: nmcli -g ipv4.dns connection show "{{ nm_connection.stdout_lines[0] }}"
  register: current_dns
  changed_when: false

- name: Get current DNS search domain for connection
  ansible.builtin.command:
    cmd: nmcli -g ipv4.dns-search connection show "{{ nm_connection.stdout_lines[0] }}"
  register: current_dns_search
  changed_when: false

- name: Get current ignore-auto-dns setting
  ansible.builtin.command:
    cmd: nmcli -g ipv4.ignore-auto-dns connection show "{{ nm_connection.stdout_lines[0] }}"
  register: current_ignore_auto_dns
  changed_when: false

- name: Set DNS server via nmcli
  ansible.builtin.command:
    cmd: >
      nmcli connection modify "{{ nm_connection.stdout_lines[0] }}"
      ipv4.dns "{{ dns_resolver_ip }} 8.8.8.8 8.8.4.4"
      ipv4.ignore-auto-dns yes
  when: >
    dns_resolver_ip not in current_dns.stdout or
    '8.8.8.8' not in current_dns.stdout or
    '8.8.4.4' not in current_dns.stdout or
    current_ignore_auto_dns.stdout | trim != 'yes'
  changed_when: true
  notify: Reload NetworkManager connection

- name: Set DNS search domain via nmcli
  ansible.builtin.command:
    cmd: >
      nmcli connection modify "{{ nm_connection.stdout_lines[0] }}"
      ipv4.dns-search "{{ dns_zone }}"
  when: dns_zone not in current_dns_search.stdout
  changed_when: true
  notify: Reload NetworkManager connection