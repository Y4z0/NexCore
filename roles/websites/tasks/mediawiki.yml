- name: Check if MediaWiki is already installed
  stat:
    path: "{{ mediawiki_install_dir }}/ansible_install"
  register: mediawiki_installed

- name: Create MediaWiki install directory
  file:
    path:  "{{ mediawiki_install_dir }}"
    state: directory
    owner: "{{ webserver_user }}"
    group: "{{ webserver_group }}"
    mode:  "0755"
  when: not mediawiki_installed.stat.exists

- name: Download MediaWiki 
  get_url:
    url: "https://releases.wikimedia.org/mediawiki/{{ mediawiki_version }}/mediawiki-{{ mediawiki_minor }}.tar.gz"    
    dest:     "/tmp/mediawiki.tar.gz"
    mode:     "0644"
  when: not mediawiki_installed.stat.exists

- name: Extract MediaWiki archive
  unarchive:
    src:        "/tmp/mediawiki.tar.gz"
    dest:       "{{mediawiki_install_dir}}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    creates:    "{{ mediawiki_install_dir }}/index.php"
    owner: "{{ webserver_user }}"
    group: "{{ webserver_group }}"
  when: not mediawiki_installed.stat.exists

- name: Set ownership on MediaWiki directory
  file:
    path:  "{{ mediawiki_install_dir }}"
    owner: "{{ webserver_user }}"
    group: "{{ webserver_group }}"
    recurse: true
  when: not mediawiki_installed.stat.exists

- name: Install Composer
  get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-setup.php
  when: not mediawiki_installed.stat.exists

- name: Run Composer installer
  shell:
    cmd: php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
    creates: /usr/local/bin/composer
  when: not mediawiki_installed.stat.exists

- name: Install MediaWiki Composer dependencies
  shell:
    cmd: /usr/local/bin/composer install --no-dev
    chdir: '{{ mediawiki_install_dir }}'
  when: not mediawiki_installed.stat.exists

- name: Install MediaWiki
  shell:
    cmd: >
      php maintenance/run.php install
      --dbtype  {{ mediawiki_db_type }}
      --dbname  {{ mediawiki_db_name }}
      --dbuser  {{ mediawiki_db_user }}
      --dbpass '{{ vault_mediawiki_db_password }}'
      --dbserver "{{ dns_serverb_ip }}"
      --pass {{ vault_mediawiki_admin_password }}
      --scriptpath ""
      --server "http://{{ mediawiki_domain }}"
      "{{ mediawiki_name }}" "{{ mediawiki_admin_user }}"
    chdir: "{{ mediawiki_install_dir }}"
    creates: "{{ mediawiki_install_dir }}/LocalSettings.php" 
  become_user: "{{ webserver_user }}"
  when: not mediawiki_installed.stat.exists
  notify: restart php-fpm

- name: Create MediaWiki installation flag 
  file:
    path: "{{ mediawiki_install_dir }}/ansible_install"
    state: touch
    mode:  "0644"
  when: not mediawiki_installed.stat.exists
   
# --- SELinux ---

- name: Set SELinux file context for MediaWiki directory
  sefcontext:
    target:  "{{ mediawiki_install_dir }}(/.*)?"
    setype:  httpd_sys_rw_content_t
    state:   present
  notify: restorecon mediawiki