---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Start and enable Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

- name: Deploy Nginx WordPress configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/{{ wp_domain }}.conf
    mode: '0644'
  notify: reload nginx

- name: Remove default Nginx welcome page config (if present)
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: reload nginx