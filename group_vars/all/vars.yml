
php_version: "8.2"
shell: "/bin/bash"
webserver_user: nginx
webserver_group: nginx

user_groups:
  - ops
  - dev
  - marketing

nexcore_users:

  - name: ops01
    groups:
      - ops
    sudo: true
    ssh_key: ssh-rsa  dev01 Ansible generated key


  - name: dev01
    groups:
      - dev
    sudo: false
    ssh_key: ssh-rsa  dev02 Ansible generated key


  - name: dev02
    groups:
      - dev
    sudo: false
    ssh_key: ssh-rsa  mkt01 Ansible generated key


  - name: mkt01
    groups:
      - marketing
    sudo: false
    ssh_key: ssh-rsa  ops01 Ansible generated key

# Wordpress
wp_site_title: "NexCore"
wp_domain: www.nexcore.local
wp_dir: /var/www/wordpress

wp_db_name: nexcore_wp
wp_db_user: nexcore_wp-user
wp_admin_user: admin
wp_admin_email: admin@nexcore.local
wp_locale: en_US

# MediaWiki
mediawiki_version: "1.45"
mediawiki_minor: "1.45.3"
mediawiki_domain: wiki.nexcore.local
mediawiki_name: "NexCore Wiki"
mediawiki_install_dir: /var/www/mediawiki
mediawiki_db_type: mysql
mediawiki_db_name: nexcore_wiki
mediawiki_db_user: nexcore_wikiuser
mediawiki_db_password: "{{ vault_mediawiki_db_password }}"

mediawiki_admin_user: WikiAdmin
mediawiki_admin_password: "{{ vault_mediawiki_admin_password }}"

mediawiki_extensions:
  - VisualEditor
  - Cite
  - ParserFunctions
  - SyntaxHighlight_GeSHi
  - CodeEditor