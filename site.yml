---
- name: Deploy on all servers
  hosts: all_servers
  roles:
    - misc
    - users

- name: Configure database
  hosts: database
  roles:
    - database

- name: Configure webserver
  hosts: web
  roles:
    - websites
    - dns

  
  post_tasks:
    - name: Deployment summary
      debug:
        msg:
          - "WordPress deployed successfully"
          - "Site URL : http://{{ wp_domain }}"
          - "Admin URL: http://{{ wp_domain }}/wp-admin"
          - "DB name  : {{ wp_db_name }}"
          - "Admin user: {{ wp_admin_user }}"