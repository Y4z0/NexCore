---
- name: Install MySQL server and Python MySQL library
  dnf:
    name:
      - mariadb-server         
      - python3-PyMySQL       
    state: present

- name: Start and enable MySQL service
  systemd:
    name: mariadb.service              
    enabled: yes
    state: started

- name: Check if root password is already set
  shell:
    cmd: mysqladmin -u root status
  register: mysql_root_check
  failed_when: false

- name: Write /root/.my.cnf for passwordless root access
  template:
    src: my.cnf.j2
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: "0600"

- name: Set MySQL root password
  mysql_user:
    name: root
    host: localhost
    password: "{{ vault_mariadb_root_password }}"
    login_unix_socket: /var/lib/mysql/mysql.sock   
    state: present
  when: mysql_root_check.rc == 0
  no_log: true

- name: Remove anonymous MariaDB users
  mysql_user:
    name: ""
    host: localhost
    state: absent
    login_user: root
    login_password: "{{ vault_mariadb_root_password }}"

- name: Remove MariaDB test database
  mysql_db:
    name: test
    state: absent
    login_user: root
    login_password: "{{ vault_mariadb_root_password }}"

- name: Remove remote root login
  mysql_query:
    login_user: root
    login_password: "{{ vault_mariadb_root_password }}"
    query: >
      DELETE FROM mysql.user
      WHERE User='root' AND Host NOT IN ('localhost', '127.0.0.1', '::1');

- name: Flush MariaDB privileges
  mysql_query:
    login_user: root
    login_password: "{{ vault_mariadb_root_password }}"
    query: "FLUSH PRIVILEGES;"

- name: Remove anonymous MySQL users
  mysql_user:
    name: ""
    host_all: yes
    state: absent
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Remove MySQL test database
  mysql_db:
    name: test
    state: absent
    login_unix_socket: /var/lib/mysql/mysql.sock

# Firewall
- name: Add in firewalld
  firewalld:
    service: mysql
    permanent: yes
    state: enabled
    immediate: yes

# Wordpress DB
- name: Create WordPress database
  mysql_db:
    name: "{{ wp_db_name }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
    collation: utf8mb4_unicode_ci

- name: Create WordPress database user with specific privileges
  mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ vault_wp_db_password }}"
    priv: "{{ wp_db_name }}.*:ALL"
    host:     "{{ hostvars['servera']['ansible_default_ipv4']['address'] }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

  
# MediaWiki DB
- name: Create MediaWiki database
  community.mysql.mysql_db:
    name:  "{{ mediawiki_db_name }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: Create MediaWiki DB user
  community.mysql.mysql_user:
    name:     "{{ mediawiki_db_user }}"
    password: "{{ vault_mediawiki_db_password }}"
    priv:     "{{ mediawiki_db_name }}.*:ALL"
    host:     "{{ hostvars['servera']['ansible_default_ipv4']['address'] }}"
    state:    present
    login_unix_socket: /var/lib/mysql/mysql.sock
