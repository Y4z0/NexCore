- name: Verify target is a RHEL-based system
  assert:
    that:
      - ansible_os_family == "RedHat"
    fail_msg: "This playbook is intended for RHEL-based systems only (got: {{ ansible_os_family }})"

- name: Make sure required packages are installed
  dnf:
    name:
      - dnf-automatic
      - logrotate
      - python3-libsemanage
      - wget
      - tar
    state: present

- name: Update packages
  ansible.builtin.dnf:
    name:            "*"
    state:           latest
    update_cache:    true
  register: pkg_update_result

- name: Check if reboot is required 
  ansible.builtin.command:
    cmd: needs-restarting -r
  register:    reboot_check
  changed_when: false
  failed_when:  false

- name: Reboot is required
  ansible.builtin.reboot:
    msg:            "Ansible initiated reboot after patching"
    reboot_timeout: 300
  when: reboot_check.rc == 1



